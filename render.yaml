# Render Blueprint -- describes this service's deployment config as code
# instead of clicking through Render's dashboard by hand. Apply once via
# Render's "New > Blueprint" pointed at this repo; from then on, changes
# pushed to this file are picked up on the next deploy.
#
# Secrets (UPSTOX_ACCESS_TOKEN, SUPABASE_URL, SUPABASE_KEY) are marked
# `sync: false` deliberately -- set those manually in the Render dashboard,
# never commit them here.
services:
  - type: web
    name: fno-derivatives-analytics-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LIVE_NSE
        value: "false"
      - key: SUPABASE_RELAY
        value: "false"
      - key: BACKGROUND_POLL
        value: "false"
      - key: WS_FEED_ENABLED
        value: "false"
      - key: UPSTOX_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
